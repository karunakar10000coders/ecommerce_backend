spring.application.name=ecommerce-backend
server.port=${PORT:8080}

# Spring Boot Configuration Import for Local Development
spring.config.import=optional:classpath:application-local.properties

# MySQL (Aiven Cloud / Local placeholders)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce_db}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Razorpay Test Mode
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_test_secret}

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000}

